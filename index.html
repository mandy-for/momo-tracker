<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱😽 Momo 雲端管家</title>
    <style>
        :root { --primary: #ff9a9e; --bg: #fff5f5; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff6b81; margin-bottom: 5px; font-size: 1.6em; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; background: #eee; font-weight: bold; font-size: 0.95em; }
        .tab-btn.active { background: #ff6b81; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { background: #fff9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .row-inputs { display: flex; gap: 5px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box; }
        button { background: #ff6b81; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 5px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: white; padding: 10px; margin-top: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .history-card { border: 1px solid #eee; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.95em; background: #fafafa; }
        .status-bar { text-align: center; font-size: 0.85em; color: #666; background: #f0f0f0; padding: 6px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .calc-preview { font-size: 0.85em; color: #888; margin-left: 5px; margin-top: 2px; }
        
        /* 📊 藥物表格專用樣式 */
        .med-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        .med-table th, .med-table td { border: 1px solid #eee; padding: 10px 5px; text-align: center; font-size: 0.9em; }
        .med-table th { background: #ffeaeae7; color: #ff6b81; font-weight: bold; }
        .med-table td:first-child { font-weight: bold; color: #444; text-align: left; padding-left: 10px; }
        .med-btn { border: none; padding: 6px 8px; border-radius: 6px; font-size: 0.8em; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; }
        .med-btn.yes { background: #badc58; color: #333; }
        .med-btn.no { background: #ffeaa7; color: #d63031; }
        .med-btn.disabled { background: #f5f5f5; color: #bbb; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱😽 Momo 雲端管家</h1>
    <div id="syncStatus" class="status-bar">🔄 正在初始連線雲端...</div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('today')">今日紀錄</button>
        <button class="tab-btn" onclick="switchTab('history')">歷史回顧 📜</button>
    </div>

    <div id="todayTab" class="tab-content active">
        <p id="displayDate" style="text-align:center; color:#555; font-weight: bold; margin-bottom: 15px;"></p>
        
        <div class="section">
            <h3>🍖 飲食紀錄 (自動計算卡路里)</h3>
            <div class="input-group">
                <select id="foodSelect" onchange="updateCalcPreview()">
                    <option value="吱吱/腎活" data-ratio="1.0">吱吱/腎活 (1 kcal/g)</option>
                    <option value="Reco" data-ratio="1.9">Reco (1.9 kcal/ml)</option>
                    <option value="RC" data-ratio="1.0">RC (1.0 kcal/ml)</option>
                    <option value="Others (0.5kcal/g)" data-ratio="0.5">Others (0.5 kcal/g)</option>
                </select>
                <div class="row-inputs">
                    <input type="number" id="foodAmount" placeholder="輸入餵食量 (g/ml)" oninput="updateCalcPreview()">
                    <span id="calcPreview" class="calc-preview" style="align-self: center; white-space: nowrap; font-weight: bold; color: #777;">= 0 kcal</span>
                </div>
                <button onclick="addFood()">新增飲食紀錄</button>
            </div>
            <ul id="foodList"></ul>
            <p style="text-align:right; font-weight:bold; color: #ff6b81; font-size: 1.1em; margin-top: 10px;">今日總計: <span id="totalCal">0</span> kcal</p>
        </div>

        <div class="section">
            <h3>💊 今日處方藥物進度表</h3>
            <table class="med-table">
                <thead>
                    <tr>
                        <th style="width: 34%;">藥物名稱</th>
                        <th style="width: 22%;">早上</th>
                        <th style="width: 22%;">夜晚</th>
                        <th style="width: 22%;">需要時</th>
                    </tr>
                </thead>
                <tbody id="medTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="historyTab" class="tab-content">
        <h3>📊 Google Sheet 雲端歷史紀錄</h3>
        <div id="historyList">讀取中...</div>
    </div>
</div>

<script>
    // 🔗 你的專屬 Web App URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZzY5dRW47mIR2jBHDsa47JlTQmQD2OlM93Z31_2mn6QsEFfE2LEOdwXbAmngri_7QXw/exec';

    // 🌟 固定處方藥物清單定義
    const MED_TEMPLATES = [
        { name: "Rapros", morning: true, night: true, inNeed: false },
        { name: "K",      morning: true, night: true, inNeed: false },
        { name: "BP",     morning: true, night: true, inNeed: false },
        { name: "開胃",   morning: false, night: false, inNeed: true },
        { name: "止痛",   morning: false, night: false, inNeed: true }
    ];

    let foodData = JSON.parse(localStorage.getItem('momo_food')) || [];
    
    // 初始化或讀取藥物狀態庫
    let medState = JSON.parse(localStorage.getItem('momo_med_table_state'));
    if (!medState || medState.length !== MED_TEMPLATES.length) {
        medState = MED_TEMPLATES.map(m => ({
            name: m.name,
            morningTaken: false,
            nightTaken: false,
            inNeedCount: 0  // 需要時服用紀錄次數
        }));
    }

    let historyData = [];
    let lastActiveDate = localStorage.getItem('momo_last_date');

    function updateCalcPreview() {
        const select = document.getElementById('foodSelect');
        const ratio = parseFloat(select.options[select.selectedIndex].getAttribute('data-ratio'));
        const amount = parseFloat(document.getElementById('foodAmount').value) || 0;
        const result = (amount * ratio).toFixed(1);
        document.getElementById('calcPreview').innerText = `= ${result} kcal`;
    }

    async function checkMidnightArchive() {
        const now = new Date();
        const currentDateStr = now.toLocaleDateString('zh-HK'); 
        document.getElementById('displayDate').innerText = "今日日期: " + currentDateStr;

        if (lastActiveDate && lastActiveDate !== currentDateStr) {
            if (foodData.length > 0 || medState.some(m => m.morningTaken || m.nightTaken || m.inNeedCount > 0)) {
                const totalCal = foodData.reduce((s, i) => s + i.cal, 0);
                const details = foodData.map(f => `${f.name}[${f.amount}g/ml](${f.cal}kcal)`).join(', ') || '無紀錄';
                
                // 將表格狀態轉化為文字格式存入 Google Sheet
                const medsText = medState.map(m => {
                    let parts = [];
                    const template = MED_TEMPLATES.find(t => t.name === m.name);
                    if (template.morning) parts.push(`早:${m.morningTaken ? '✅':'❌'}`);
                    if (template.night) parts.push(`夜:${m.nightTaken ? '✅':'❌'}`);
                    if (template.inNeed) parts.push(`需:${m.inNeedCount}次`);
                    return `${m.name}(${parts.join(',')})`;
                }).join(' | ');

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: "append", date: lastActiveDate, totalCal, details, meds: medsText })
                    });
                    
                    // 跨天重置數據
                    foodData = [];
                    medState = MED_TEMPLATES.map(m => ({
                        name: m.name,
                        morningTaken: false,
                        nightTaken: false,
                        inNeedCount: 0
                    }));
                } catch (e) { console.error(e); }
            }
        }
        lastActiveDate = currentDateStr;
        localStorage.setItem('momo_last_date', lastActiveDate);
        saveLocal();
        renderTodayData();
        fetchHistoryFromCloud();
    }

    async function fetchHistoryFromCloud() {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000); 

        try {
            let response = await fetch(`${GOOGLE_SCRIPT_URL}?action=read`, { 
                method: 'GET',
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            historyData = await response.json();
            historyData.reverse();
            renderHistoryData();
            document.getElementById('syncStatus').innerText = "✅ 雲端連線成功";
        } catch (e) {
            clearTimeout(timeoutId);
            document.getElementById('syncStatus').innerText = "⚠️ 離線使用中 (數據將於午夜上傳)";
            renderHistoryData();
        }
    }

    function addFood() {
        const select = document.getElementById('foodSelect');
        const name = select.value;
        const ratio = parseFloat(select.options[select.selectedIndex].getAttribute('data-ratio'));
        const amount = parseFloat(document.getElementById('foodAmount').value);
        
        if (!isNaN(amount) && amount > 0) { 
            const cal = Math.round(amount * ratio * 10) / 10; 
            foodData.push({ name, amount, cal }); 
            saveLocal(); 
            renderTodayData(); 
            document.getElementById('foodAmount').value = '';
            document.getElementById('calcPreview').innerText = '= 0 kcal';
        }
    }

    // 切換早晚藥物打勾狀態
    function toggleTableMed(idx, period) {
        if (period === 'morning') medState[idx].morningTaken = !medState[idx].morningTaken;
        if (period === 'night') medState[idx].nightTaken = !medState[idx].nightTaken;
        saveLocal();
        renderTodayData();
    }

    // 增加需要時服用藥物次數
    function incrementInNeed(idx) {
        medState[idx].inNeedCount += 1;
        saveLocal();
        renderTodayData();
    }
    
    // 長按/雙擊可以重置需要時服用的次數 (防呆修正)
    function resetInNeed(idx) {
        medState[idx].inNeedCount = 0;
        saveLocal();
        renderTodayData();
    }

    function saveLocal() {
        localStorage.setItem('momo_food', JSON.stringify(foodData));
        localStorage.setItem('momo_med_table_state', JSON.stringify(medState));
    }

    function renderTodayData() {
        // 渲染食物
        const fList = document.getElementById('foodList'); fList.innerHTML = '';
        let total = 0;
        foodData.forEach(f => { 
            total += f.cal; 
            fList.innerHTML += `<li><span>${f.name} (${f.amount} g/ml)</span> <strong>${f.cal} kcal</strong></li>`; 
        });
        document.getElementById('totalCal').innerText = total.toFixed(1);

        // 渲染全新藥物表格
        const tBody = document.getElementById('medTableBody'); tBody.innerHTML = '';
        MED_TEMPLATES.forEach((m, i) => {
            let rowHtml = `<tr><td>${m.name}</td>`;
            
            // 早上欄位
            if (m.morning) {
                const taken = medState[i].morningTaken;
                rowHtml += `<td><button class="med-btn ${taken?'yes':'no'}" onclick="toggleTableMed(${i}, 'morning')">${taken?'✅ 已餵':'❌ 未餵'}</button></td>`;
            } else {
                rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`;
            }
            
            // 夜晚欄位
            if (m.night) {
                const taken = medState[i].nightTaken;
                rowHtml += `<td><button class="med-btn ${taken?'yes':'no'}" onclick="toggleTableMed(${i}, 'night')">${taken?'✅ 已餵':'❌ 未餵'}</button></td>`;
            } else {
                rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`;
            }
            
            // 需要時欄位
            if (m.inNeed) {
                const count = medState[i].inNeedCount;
                rowHtml += `<td><button class="med-btn ${count>0?'yes':'no'}" onclick="incrementInNeed(${i})" ondblclick="resetInNeed(${i})">${count > 0 ? '✅ '+count+' 次' : '❌ 未餵'}</button></td>`;
            } else {
                rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`;
            }
            
            rowHtml += `</tr>`;
            tBody.innerHTML += rowHtml;
        });
    }

    function renderHistoryData() {
        const hList = document.getElementById('historyList');
        if(historyData.length === 0) {
            hList.innerHTML = "<p style='color:#888;text-align:center;padding:20px;'>暫無雲端紀錄。今日數據將於跨天時自動建檔。</p>";
            return;
        }
        hList.innerHTML = historyData.map(h => `
            <div class="history-card">
                <strong>📅 ${h.date}</strong> | <span style="color:#ff6b81;font-weight:bold;">🔥 ${h.totalCal} kcal</span><br>
                <div style="margin-top:5px; color:#555; font-size:0.9em; word-break: break-all;">🍖 飲食: ${h.details}</div>
                <div style="color:#555; font-size:0.85em; margin-top:3px; word-break: break-all; border-top:1px dashed #eee; padding-top:3px;">💊 藥物: ${h.meds}</div>
            </div>
        `).join('');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        event.currentTarget.classList.add('active');
        if(tab === 'history') { fetchHistoryFromCloud(); }
    }

    checkMidnightArchive();
</script>
</body>
</html>

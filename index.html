<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱😽 Momo 雲端管家</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff9a9e; --bg: #fff5f5; --text: #333; --blue: #74b9ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { text-align: center; color: #ff6b81; margin-bottom: 5px; font-size: 1.6em; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; background: #eee; font-weight: bold; font-size: 0.95em; }
        .tab-btn.active { background: #ff6b81; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { background: #fff9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .section.water-sec { background: #f0f7ff; border-left: 5px solid var(--blue); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .row-inputs { display: flex; gap: 5px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box; }
        button { background: #ff6b81; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 5px; }
        .water-sec button { background: var(--blue); }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: white; padding: 10px; margin-top: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .history-card { border: 1px solid #eee; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.95em; background: #fafafa; }
        .status-bar { text-align: center; font-size: 0.85em; color: #666; background: #f0f0f0; padding: 6px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .calc-preview { font-size: 0.85em; color: #888; margin-left: 5px; margin-top: 2px; }
        
        .med-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        .med-table th, .med-table td { border: 1px solid #eee; padding: 10px 5px; text-align: center; font-size: 0.9em; }
        .med-table th { background: #ffeaeae7; color: #ff6b81; font-weight: bold; }
        .med-table td:first-child { font-weight: bold; color: #444; text-align: left; padding-left: 10px; }
        .med-btn { border: none; padding: 6px 8px; border-radius: 6px; font-size: 0.8em; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; }
        .med-btn.yes { background: #badc58; color: #333; }
        .med-btn.no { background: #ffeaa7; color: #d63031; }
        .med-btn.disabled { background: #f5f5f5; color: #bbb; cursor: not-allowed; }
        
        /* 🛡️ 核心修正：鎖死圖表容器高度，防止無限拉長崩潰 */
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box; height: 250px; position: relative; overflow: hidden; }
        .sync-btn { background: #6ab04c; margin-bottom: 15px; }
        .chart-view-select { margin-bottom: 8px; font-weight: bold; background: #fffdfd; border: 2px solid #ff9a9e; color: #ff6b81; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱😽 Momo 雲端管家</h1>
    <div id="syncStatus" class="status-bar">🔄 正在載入雲端同步數據...</div>
    
    <button class="sync-btn" onclick="syncAllFromCloud()">🔄 點擊刷新/同步全家人數據</button>

    <div class="chart-container">
        <select id="chartViewType" class="chart-view-select" onchange="updateChart()">
            <option value="kcal">📊 查看最近一個月：卡路里趨勢圖</option>
            <option value="water">💧 查看最近一個月：飲水量趨勢圖</option>
        </select>
        <canvas id="kcalChart" style="width: 100% !important; height: 180px !important;"></canvas>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('today')">今日紀錄</button>
        <button class="tab-btn" onclick="switchTab('history')">歷史回顧 📜</button>
    </div>

    <div id="todayTab" class="tab-content active">
        <p id="displayDate" style="text-align:center; color:#555; font-weight: bold; margin-bottom: 15px;"></p>
        
        <div class="section">
            <h3>🍖 飲食紀錄 (自動計算卡路里及水份)</h3>
            <div class="input-group">
                <select id="foodSelect" onchange="updateCalcPreview()">
                    <option value="吱吱/腎活" data-ratio="1.0" data-w="0.8">吱吱/腎活 (1 kcal | 水80%)</option>
                    <option value="Reco" data-ratio="1.9" data-w="0.66">Reco (1.9 kcal | 水66%)</option>
                    <option value="RC" data-ratio="1.0" data-w="0.8">RC (1.0 kcal | 水80%)</option>
                    <option value="Others (0.5kcal/g)" data-ratio="0.5" data-w="0.7">Others (0.5 kcal | 水70%)</option>
                </select>
                <div class="row-inputs">
                    <input type="number" id="foodAmount" placeholder="輸入餵食量 (g/ml)" oninput="updateCalcPreview()">
                    <span id="calcPreview" class="calc-preview" style="align-self: center; white-space: nowrap; font-weight: bold; color: #777;">= 0 kcal</span>
                </div>
                <button onclick="addFood()">新增飲食紀錄</button>
            </div>
            <ul id="foodList"></ul>
            <p style="text-align:right; font-weight:bold; color: #ff6b81; font-size: 1.1em; margin-top: 10px;">今日總計: <span id="totalCal">0</span> kcal</p>
        </div>

        <div class="section water-sec">
            <h3>💧 額外水分紀錄 (安全紅線: 150ml)</h3>
            <div class="input-group">
                <select id="waterSelect">
                    <option value="直接喝水">直接喝水</option>
                    <option value="皮下水">皮下水</option>
                </select>
                <input type="number" id="waterAmount" placeholder="輸入補水量 (ml)">
                <button onclick="addWater()">新增補水紀錄</button>
            </div>
            <ul id="waterList"></ul>
            <p style="text-align:right; font-weight:bold; color: #2d3436; font-size: 1em; margin-top: 10px;">
                食物內含水: <span id="foodWater">0</span> ml<br
